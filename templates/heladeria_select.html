<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OGGI — Portal Heladería</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --brown: #7B3A10; --dark: #2D1000; --beige: #F5E6CC; --light: #F9F0E1; }
    body { background: var(--light); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .logo-text { font-family:'Dancing Script',cursive; font-size:3.5rem; font-weight:700; color:var(--brown); }
    .logo-sub { font-size:.72rem; color:var(--brown); letter-spacing:.2em; font-style:italic; opacity:.7; }
    .card { border:none; border-radius:14px; box-shadow:0 8px 32px rgba(45,16,0,.12); }
    .btn-shop { border-radius:10px; font-size:1.05rem; padding:.7rem 1.5rem;
                background:var(--brown); color:#fff; border:none; width:100%; transition:background .2s; }
    .btn-shop:hover { background:var(--dark); color:#fff; }
    .footer-credit { font-size:.7rem; color:#b08060; font-style:italic; text-align:center; margin-top:1rem; }
  </style>
</head>
<body>
  <div style="max-width:400px; width:100%; padding:1rem">
    <div class="text-center mb-4">
      <div class="logo-text">oggi</div>
      <hr style="border-color:var(--brown); opacity:.2; width:60px; margin:.5rem auto">
      <div class="logo-sub">officina gelato gusto italiano</div>
    </div>

    <div class="card p-4">
      <h6 class="text-center mb-3" style="color:var(--dark); font-weight:600">¿Qué heladería sos?</h6>
      {% if heladerias %}
      <div class="d-flex flex-column gap-2">
        {% for h in heladerias %}
        <a href="{{ url_for('heladeria_portal', hid=h.id) }}" class="btn btn-shop">{{ h.nombre }}</a>
        {% endfor %}
      </div>
      {% else %}
      <div class="alert alert-warning mb-0">No hay heladerías configuradas.</div>
      {% endif %}
      <hr class="my-3">
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm text-center">
        ← Panel de producción
      </a>
    </div>

    <div class="footer-credit">Desarrollado por Erick Espina · Sr. Finley</div>
  </div>
</body>
</html>
