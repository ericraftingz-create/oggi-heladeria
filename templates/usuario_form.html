{% extends "base.html" %}
{% block title %}Editar usuario{% endblock %}
{% block content %}
<div class="page-header d-flex align-items-center gap-3">
  <a href="{{ url_for('usuarios') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h1 class="mb-0">Editar usuario: {{ usuario.username }}</h1>
</div>

<div class="card" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" class="form-control" value="{{ usuario.username }}" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre completo</label>
        <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nueva contraseña <span class="text-muted small">(dejar vacío para no cambiar)</span></label>
        <input type="password" name="password" class="form-control" autocomplete="new-password">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Rol</label>
        <select name="rol" class="form-select" id="rolEdit" onchange="toggleHel(this)">
          <option value="superadmin" {% if usuario.rol == 'superadmin' %}selected{% endif %}>superadmin</option>
          <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>admin</option>
          <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>cliente</option>
        </select>
      </div>
      <div class="mb-3" id="helRow">
        <label class="form-label fw-semibold">Heladería</label>
        <select name="heladeria_id" class="form-select">
          <option value="">— Sin asignar —</option>
          {% for h in heladerias %}
          <option value="{{ h.id }}" {% if usuario.heladeria_id == h.id %}selected{% endif %}>{{ h.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function toggleHel(sel) {
  document.getElementById('helRow').style.display = sel.value === 'cliente' ? 'block' : 'none';
}
toggleHel(document.getElementById('rolEdit'));
</script>
{% endblock %}
