{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="page-header d-flex align-items-center gap-2">
  <a href="{{ url_for('bases') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h1>{{ titulo }}</h1>
</div>

<div class="card" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text" name="nombre" class="form-control" required
               value="{{ base.nombre if base else '' }}" placeholder="Ej: Base latte">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Rendimiento por tanda (kg)</label>
        <input type="number" name="rendimiento_kg" class="form-control" min="0.1" step="0.1"
               value="{{ base.rendimiento_kg if base else '1' }}"
               placeholder="Ej: 60">
        <div class="form-text">Cuántos kg produce una tanda completa. Se usa para escalar la receta.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notas</label>
        <textarea name="notas" class="form-control" rows="3"
                  placeholder="Descripción, consejos, etc.">{{ base.notas if base else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-circle me-1"></i>{{ 'Guardar cambios' if base else 'Crear base' }}
        </button>
        <a href="{{ url_for('bases') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
