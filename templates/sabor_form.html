{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ titulo }}</h1>
</div>

<div class="card" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre del sabor *</label>
        <input type="text" name="nombre" class="form-control form-control-lg" required
               value="{{ sabor.nombre if sabor else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Disponibilidad inicial</label>
        <select name="disponibilidad" class="form-select">
          <option value="bajo_pedido" {% if not sabor or sabor.disponibilidad == 'bajo_pedido' %}selected{% endif %}>🟠 Bajo pedido (a producir)</option>
          <option value="disponible" {% if sabor and sabor.disponibilidad == 'disponible' %}selected{% endif %}>✅ Disponible en stock</option>
          <option value="no_disponible" {% if sabor and sabor.disponibilidad == 'no_disponible' %}selected{% endif %}>❌ No disponible</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Vida útil (días) <small class="text-muted fw-normal">para etiquetas</small></label>
        <input type="number" name="vida_util_dias" class="form-control"
               min="1" value="{{ sabor.vida_util_dias if sabor else 7 }}" placeholder="7">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notas</label>
        <textarea name="notas" class="form-control" rows="2">{{ sabor.notas if sabor else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('sabores') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
